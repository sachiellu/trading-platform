version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: trade-db
    environment:
      - POSTGRES_DB=tradedb
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tradedb"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: trade-app
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=tradedb
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - APP_JWT_SECRET=5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

volumes:
  pgdata:
